<!DOCTYPE html>
<html>
<head>
  <title>twizzy match up</title>

  <style>
    body {
      font-family: "Comic Sans MS", "Arial Rounded MT Bold", sans-serif;
      text-align: center;
      background: url("https://tse1.mm.bing.net/th/id/OIP.s_i1w8Zdd_AwX5SSQjLC0wHaE8?rs=1&pid=ImgDetMain&o=7&rm=3");
      background-size: cover;
      background-position: center;
      color: #ff4da6;
    }

    h2 {
      margin-top: 20px;
      font-size: 32px;
      text-shadow: 2px 2px white;
    }

    #game {
      background: rgba(255, 255, 255, 0.6);
      border-radius: 30px;
      padding: 20px;
      width: 80%;
      margin: auto;
      backdrop-filter: blur(6px);
    }

    img {
      width: 120px;
      margin: 10px;
      cursor: grab;
      border-radius: 20px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.2);
      animation: float 3s ease-in-out infinite;
    }

    .zone {
      width: 140px;
      height: 140px;
      border: 3px dashed #ff99cc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 20px;
      border-radius: 30px;
      background: rgba(255, 182, 193, 0.6);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
      animation: float 4s ease-in-out infinite;
    }

    #message {
      font-size: 22px;
      margin-top: 20px;
      background: rgba(255,255,255,0.7);
      display: inline-block;
      padding: 10px 20px;
      border-radius: 20px;
    }

    /* FLOATING ANIMATION */
    @keyframes float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>

<body>

<h2>💗 twizzy match up 💗</h2>

<div id="game">

<p>match them up NOWW!!!!!!!!!!!!!!</p>

<!-- ITEMS -->
<div>
  <img id="img1" src="https://f2.toyhou.se/file/f2-toyhou-se/images/116214857_Ugpq100yAvJ27yI.png" draggable="true">
  <img id="img2" src="https://f2.toyhou.se/file/f2-toyhou-se/images/116161728_umAXnRPoVL4MUaF.png" draggable="true">
  <img id="img3" src="https://f2.toyhou.se/file/f2-toyhou-se/images/116214904_htXYy5iDNpvToX6.png" draggable="true">
</div>

<!-- ZONES (no labels now) -->
<div>
  <div class="zone" data-correct="img1"></div>
  <div class="zone" data-correct="img2"></div>
  <div class="zone" data-correct="img3"></div>
</div>

<p id="message">💗 die.........…</p>

</div>

<script>
  let dragged = null;
  let score = 0;

  const images = document.querySelectorAll("img");
  const zones = document.querySelectorAll(".zone");
  const message = document.getElementById("message");

  images.forEach(img => {
    img.addEventListener("dragstart", () => {
      dragged = img.id;
    });
  });

  zones.forEach(zone => {
    zone.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    zone.addEventListener("drop", (e) => {
      e.preventDefault();

      if (zone.dataset.correct === dragged) {
        zone.appendChild(document.getElementById(dragged));
        score++;

        message.innerText = "YAYYY 💕";

        if (score === 3) {
          message.innerText = "good job rainbow </3 🌸";
        }

      } else {
        message.innerText = "ARE YOU STUPID HEAD?????////💔";
      }
    });
  });
</script>

</body>
</html>
